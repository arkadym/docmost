name: Build and push Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 \
            "https://x-token:${{ gitea.token }}@gitea.tegro.org/${{ gitea.repository }}.git" \
            --branch "${{ gitea.ref_name }}" \
            .

      - name: Determine image tags
        run: |
          IMAGE="ghcr.io/arkadym/docmost"
          REF="${{ gitea.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            MAJOR_MINOR="${VERSION%.*}"
            echo "DOCKER_TAGS=${IMAGE}:${VERSION} ${IMAGE}:${MAJOR_MINOR} ${IMAGE}:latest" >> $GITHUB_ENV
          else
            echo "DOCKER_TAGS=${IMAGE}:latest" >> $GITHUB_ENV
          fi

      - name: Ensure Docker is available
        run: |
          if ! command -v docker &>/dev/null; then
            apt-get update -qq
            apt-get install -y -qq docker.io
          fi
          docker version

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          TAG_ARGS=""
          for tag in $DOCKER_TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          docker build $TAG_ARGS -f Dockerfile .
          for tag in $DOCKER_TAGS; do
            docker push "$tag"
          done

      - name: Docker logout
        if: always()
        run: docker logout ghcr.io
