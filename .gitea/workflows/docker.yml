name: Build and push Docker image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 \
            "https://x-token:${{ secrets.GITEA_TOKEN }}@gitea.tegro.org/${{ github.repository }}.git" \
            --branch "${{ github.ref_name }}" \
            .

      - name: Determine image tags
        run: |
          IMAGE="ghcr.io/arkadym/docmost"
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          MAJOR_MINOR="${VERSION%.*}"
          echo "DOCKER_TAGS=${IMAGE}:${VERSION} ${IMAGE}:${MAJOR_MINOR} ${IMAGE}:latest" >> $GITHUB_ENV

      - name: Install Docker CLI
        run: apk add --no-cache docker-cli

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          TAG_ARGS=""
          for tag in $DOCKER_TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          docker build $TAG_ARGS -f Dockerfile .
          for tag in $DOCKER_TAGS; do
            docker push "$tag"
          done

      - name: Docker logout
        if: always()
        run: docker logout ghcr.io
